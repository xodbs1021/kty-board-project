<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KTY Board - 새 글 작성</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .write-container {
            max-width: 800px;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .form-label { font-weight: 600; color: #495057; }
        textarea { resize: none; } /* 사용자가 리사이즈해서 레이아웃 깨지는 것 방지 */
    </style>
</head>
<body class="container">
<div class="write-container mx-auto">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary">📝 새 글 작성</h2>
        <span class="badge bg-light text-dark p-2">
                작성자: <span th:text="${session.nickname}" class="fw-bold">사용자</span>
            </span>
    </div>

    <hr class="mb-4">

    <form action="/api/posts/write" method="post">
        <div class="mb-4">
            <label for="title" class="form-label">제목</label>
            <input type="text" name="title" class="form-control form-control-lg"
                   id="title" placeholder="제목을 입력하세요" required
                   maxlength="100">
            <div class="form-text">최대 100자까지 입력 가능합니다.</div>
        </div>

        <div class="mb-4">
            <label for="content" class="form-label">내용</label>
            <textarea name="content" class="form-control"
                      id="content" rows="12"
                      placeholder="나누고 싶은 이야기를 자유롭게 적어주세요."
                      required></textarea>
        </div>

        <div class="d-flex justify-content-between pt-3">
            <a href="/board" class="btn btn-outline-secondary px-4">
                <i class="bi bi-arrow-left"></i> 취소
            </a>
            <button type="submit" class="btn btn-primary px-5 fw-bold">
                등록하기
            </button>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
