<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KTY Board - 글쓰기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .write-container { max-width: 700px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="container">
<div class="write-container mx-auto">
    <h2 class="mb-4">새 글 작성</h2>
    <form action="/api/posts/write" method="post">
        <div class="mb-3">
            <label for="title" class="form-label">제목</label>
            <input type="text" name="title" class="form-control" id="title" placeholder="제목을 입력하세요" required>
        </div>
        <div class="mb-3">
            <label for="content" class="form-label">내용</label>
            <textarea name="content" class="form-control" id="content" rows="10" placeholder="내용을 입력하세요" required></textarea>
        </div>
        <div class="d-flex justify-content-between">
            <a href="/board" class="btn btn-secondary">취소</a>
            <button type="submit" class="btn btn-primary">등록하기</button>
        </div>
    </form>
</div>
</body>
</html>
