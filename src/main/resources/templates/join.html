<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KTY Board - 회원가입</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .join-form { width: 100%; max-width: 450px; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="join-form">
    <h2 class="text-center mb-4">Join Us</h2>
    <form action="/join" method="post">
        <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input type="email" name="email" class="form-control" id="email"
                   th:value="${email}" placeholder="kty@sejong.ac.kr" required>
        </div>
        <div class="mb-3">
            <label for="nickname" class="form-label">Nickname</label>
            <input type="text" name="nickname" class="form-control" id="nickname"
                   th:value="${nickname}" placeholder="닉네임을 입력하세요" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" name="password" class="form-control" id="password" required>
        </div>
        <button type="submit" class="btn btn-success w-100">회원가입 완료</button>
    </form>
    <div class="mt-3 text-center">
        <small>이미 계정이 있으신가요? <a href="/">로그인하러 가기</a></small>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const errorMessage = [[${errorMessage}]];
    if (errorMessage) {
        alert(errorMessage);
    }
    /*]]>*/
</script>

</body>
</html>
