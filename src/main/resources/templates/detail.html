<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KTY Board - 상세보기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .detail-container { max-width: 800px; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .content-area { min-height: 300px; white-space: pre-wrap; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body class="container">
<div class="detail-container mx-auto">
    <div class="mb-4">
        <h2 class="fw-bold" th:text="${post.title}">게시글 제목</h2>
        <div class="text-muted small d-flex justify-content-between">
            <span>작성자: <span th:text="${post.nickname}" class="fw-bold text-dark">kty</span></span>
            <span>조회수: <span th:text="${post.viewCount}">0</span></span>
        </div>
    </div>

    <div class="content-area mb-5" th:text="${post.content}">
        내용이 들어가는 자리입니다.
    </div>

    <hr>

    <div class="mt-4">
        <h5>💬 댓글 <span class="badge bg-secondary" th:text="${post.comments != null ? post.comments.size() : 0}">0</span></h5>
        <ul class="list-group list-group-flush mt-3">
            <li th:each="comment : ${post.comments}" class="list-group-item">
                <strong th:text="${comment.nickname}">댓글러</strong>:
                <span th:text="${comment.content}">댓글 내용입니다.</span>
            </li>
        </ul>
    </div>

    <div class="d-flex justify-content-end mt-4">
        <a href="/board" class="btn btn-outline-primary px-4">목록으로</a>
    </div>
</div>
</body>
</html>
