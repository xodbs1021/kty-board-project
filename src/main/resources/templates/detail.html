<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KTY Board - 게시글 상세보기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; padding-bottom: 50px; }
        .detail-container { max-width: 850px; background: white; padding: 45px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .content-area { min-height: 250px; white-space: pre-wrap; padding: 25px 0; font-size: 1.1rem; line-height: 1.6; color: #333; }
        .comment-section { background-color: #fcfcfc; border-radius: 12px; padding: 20px; }
        .comment-item { border-bottom: 1px solid #f1f1f1; padding: 12px 5px; }
        .comment-item:last-child { border-bottom: none; }
        .action-link { font-size: 0.8rem; text-decoration: none; background: none; border: none; padding: 0; cursor: pointer; }
        .delete-link { color: #dc3545; }
        .edit-link { color: #ffc107; margin-right: 8px; }
        .action-link:hover { text-decoration: underline; }
    </style>
</head>
<body class="container">
<div class="detail-container mx-auto">
    <div class="border-bottom pb-3 mb-4">
        <h2 class="fw-bold text-dark mb-3" th:text="${post.title}">게시글 제목</h2>
        <div class="d-flex justify-content-between align-items-center text-muted">
            <div>
                <span class="badge bg-primary me-2">작성자</span>
                <span th:text="${post.nickname}" class="fw-bold text-dark">kty</span>
            </div>
            <div>
                <span class="me-3">👀 조회수 <strong th:text="${post.viewCount}">0</strong></span>
                <span>📅 게시글 ID: <strong th:text="${post.id}">1</strong></span>
            </div>
        </div>
    </div>

    <div class="content-area" th:text="${post.content}">내용이 들어가는 자리입니다.</div>

    <hr class="my-5">

    <div class="comment-section">
        <h5 class="fw-bold mb-4">💬 댓글 <span class="text-primary" th:text="${post.comments != null ? post.comments.size() : 0}">0</span>개</h5>

        <form action="/api/comments" method="post" class="mb-4">
            <input type="hidden" name="postId" th:value="${post.id}">
            <div class="input-group shadow-sm">
                <textarea name="content" class="form-control" rows="2" placeholder="댓글을 입력해 주세요." required></textarea>
                <button type="submit" class="btn btn-primary px-4">등록</button>
            </div>
        </form>

        <div class="list-group list-group-flush">
            <div th:if="${#lists.isEmpty(post.comments)}" class="text-center py-4 text-muted">
                아직 댓글이 없습니다. 첫 번째 댓글을 남겨보세요!
            </div>
            <div th:each="comment : ${post.comments}" class="comment-item">
                <div class="d-flex justify-content-between align-items-start mb-1">
                    <strong class="text-dark" th:text="${comment.nickname}">댓글러</strong>

                    <div th:if="${session.nickname == comment.nickname}" class="d-flex">
                        <button type="button" class="action-link edit-link"
                                th:onclick="updateComment([[${comment.id}]], [[${post.id}]], [[${comment.content}]])">수정</button>

                        <form th:action="@{/api/comments/{id}/delete(id=${comment.id})}" method="post"
                              onsubmit="return confirm('이 댓글을 삭제하시겠습니까?');">
                            <input type="hidden" name="postId" th:value="${post.id}">
                            <button type="submit" class="action-link delete-link">삭제</button>
                        </form>
                    </div>
                </div>
                <div class="text-secondary" th:text="${comment.content}">댓글 내용입니다.</div>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-between mt-5 pt-3 border-top">
        <a href="/board" class="btn btn-outline-secondary px-4"><i class="bi bi-list"></i> 목록으로</a>

        <div th:if="${session.nickname == post.nickname}" class="d-flex gap-2">
            <a th:href="@{/posts/{id}/edit(id=${post.id})}" class="btn btn-outline-warning btn-sm">수정</a>

            <form th:action="@{/api/posts/{id}/delete(id=${post.id})}" method="post" onsubmit="return confirm('정말 삭제하시겠습니까?');">
                <button type="submit" class="btn btn-outline-danger btn-sm">삭제</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    // 뒤로가기 제어
    window.onload = function() {
        history.pushState(null, null, location.href);
        window.onpopstate = function(event) { location.href = '/board'; };
    };

    /**
     * 댓글 수정 실행 함수
     */
    function updateComment(commentId, postId, oldContent) {
        const newContent = prompt("댓글 내용을 수정하세요:", oldContent);

        // 아무것도 입력 안 하거나 취소 누르면 중단
        if (newContent === null || newContent.trim() === "" || newContent === oldContent) {
            return;
        }

        // 폼 동적 생성
        const form = document.createElement('form');
        form.method = 'POST';

        // 🔥 주소 매핑 주의: 컨트롤러의 /api/comments + /{commentId}/edit 와 일치해야 함
        form.action = '/api/comments/' + commentId + '/edit';

        // 데이터 추가 (postId, content)
        const postIdInput = document.createElement('input');
        postIdInput.type = 'hidden';
        postIdInput.name = 'postId';
        postIdInput.value = postId;

        const contentInput = document.createElement('input');
        contentInput.type = 'hidden';
        contentInput.name = 'content';
        contentInput.value = newContent.trim();

        form.appendChild(postIdInput);
        form.appendChild(contentInput);
        document.body.appendChild(form);

        // 서버로 전송
        form.submit();
    }
</script>
</body>
</html>
