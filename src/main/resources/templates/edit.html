<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KTY Board - 게시글 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="max-width: 800px; mx-auto">
    <h2 class="fw-bold mb-4">게시글 수정</h2>
    <form th:action="@{/api/posts/{id}/edit(id=${post.id})}" method="post">
        <div class="mb-3">
            <label class="form-label">제목</label>
            <input type="text" name="title" class="form-control" th:value="${post.title}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">내용</label>
            <textarea name="content" class="form-control" rows="10" th:text="${post.content}" required></textarea>
        </div>
        <div class="d-flex justify-content-end gap-2">
            <a th:href="@{/posts/{id}(id=${post.id})}" class="btn btn-secondary">취소</a>
            <button type="submit" class="btn btn-primary">수정 완료</button>
        </div>
    </form>
</div>
</body>
</html>
