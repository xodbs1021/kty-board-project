<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KTY Board - 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>게시판 목록</h2>
    <div>
        <span class="fw-bold" th:text="${session.nickname}">사용자</span>님 환영합니다!
        <a href="/logout" class="btn btn-sm btn-outline-danger ms-2">로그아웃</a>
    </div>
</div>

<table class="table table-hover">
    <thead class="table-light">
    <tr>
        <th>번호</th>
        <th>제목</th>
        <th>작성자</th>
        <th>조회수</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="post : ${posts}">
        <td th:text="${post.id}">1</td>
        <td>
            <a th:href="@{/api/posts/{id}(id=${post.id})}" th:text="${post.title}">제목입니다</a>
        </td>
        <td th:text="${post.nickname}">작성자</td>
        <td th:text="${post.viewCount}">0</td>
    </tr>
    </tbody>
</table>

<div class="d-flex justify-content-end">
    <a href="/write" class="btn btn-primary">글쓰기</a>
</div>
</body>
</html>
